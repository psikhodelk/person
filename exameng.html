<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Leader Prep - Table Edition</title>
    <style>
        :root { --red: #e63946; --green: #2a9d8f; --blue: #457b9d; --dark: #1d3557; --light: #f1faee; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--light); color: var(--dark); padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--red); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        /* Сетка кнопок */
        .unit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .unit-btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .unit-btn.active { background: var(--red); transform: scale(1.05); }

        /* Вкладки */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 3px solid #eee; padding-bottom: 15px; display: none; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; background: #f0f0f0; font-weight: bold; font-size: 1em; transition: 0.3s; }
        .tab-btn.active { background: var(--red); color: white; }

        /* Таблицы как в ответах */
        .info-section { display: none; animation: fadeIn 0.4s; }
        .info-table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fff; font-size: 0.95em; }
        .info-table th, .info-table td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        .info-table th { background: #f8f9fa; color: var(--blue); font-weight: bold; }
        .idiom-row { background: #fffdf0; }
        .grammar-block { background: #e9f5f8; padding: 15px; border-radius: 10px; border-left: 5px solid var(--blue); margin: 15px 0; }

        /* Тест */
        .test-section { display: none; }
        .question-card { background: #fdfdfd; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; border-left: 6px solid #ccc; transition: 0.3s; }
        .question-card.correct { background: #d8f3dc; border-left-color: var(--green); }
        .question-card.incorrect { background: #f8d7da; border-left-color: var(--red); }
        .options-list label { display: block; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 8px; border: 1px solid transparent; }
        .options-list label:hover { background: #f1f1f1; border-color: #ddd; }
        .explanation { margin-top: 15px; font-weight: bold; color: #444; display: none; font-style: italic; }

        /* Кнопки внизу */
        .action-btns { display: flex; gap: 15px; margin-top: 30px; position: sticky; bottom: 20px; z-index: 100; }
        .btn-action { flex: 1; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; font-size: 1.1em; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #checkBtn { background: var(--green); }
        #resetBtn { background: var(--blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Market Leader Prep: Unit Expert</h1>
    <div class="unit-grid" id="unitGrid"></div>

    <div class="tabs" id="tabsMenu">
        <button class="tab-btn active" id="tab-info" onclick="switchTab('info')">INFO (Таблицы)</button>
        <button class="tab-btn" id="tab-test" onclick="switchTab('test')">TEST (20 Вопросов)</button>
        <button class="tab-btn" id="tab-text" onclick="switchTab('text')">TEXT (Для пересказа)</button>
    </div>

    <div id="infoBox" class="info-section"></div>
    
    <div id="testBox" class="test-section">
        <div id="qContainer"></div>
        <div class="action-btns">
            <button id="checkBtn" class="btn-action" onclick="checkAll()">ПРОВЕРИТЬ</button>
            <button id="resetBtn" class="btn-action" onclick="resetAll()">СБРОСИТЬ</button>
        </div>
    </div>

    <div id="textBox" class="info-section">
        <div style="font-size: 1.2em; line-height: 1.8; background: #fff; padding: 25px; border-radius: 15px; border: 1px dashed #ccc;" id="readText"></div>
    </div>
</div>

<script>
// ПОЛНАЯ БАЗА ДАННЫХ
const unitData = {
    1: {
        title: "Unit 1: Brands (Бренды)",
        info: `<h3>1. Бизнес-лексика (Brand Collocations)</h3>
               <table class="info-table">
                 <tr><th>Термин</th><th>Перевод</th><th>Пример</th></tr>
                 <tr><td>Brand loyalty</td><td>Лояльность к бренду</td><td>Apple has high brand loyalty.</td></tr>
                 <tr><td>Market share</td><td>Доля рынка</td><td>We want to increase our market share.</td></tr>
                 <tr><td>Product launch</td><td>Запуск продукта</td><td>The product launch is in June.</td></tr>
                 <tr class="idiom-row"><td>Go upmarket (Idiom)</td><td>Перейти в люкс</td><td>The brand decided to go upmarket.</td></tr>
               </table>
               <h3>2. Предлоги (Prepositions)</h3>
               <table class="info-table">
                 <tr><td>Focus <b>on</b></td><td>Сосредоточиться на</td><td>Focus on the target audience.</td></tr>
                 <tr><td>Appeal <b>to</b></td><td>Привлекать</td><td>It appeals to wealthy people.</td></tr>
               </table>
               <div class="grammar-block">
                 <strong>Грамматика: Present Simple vs Continuous</strong><br>
                 Simple: Факт/Рутина (Every month). Continuous: Прямо сейчас/Временно (This week).
               </div>`,
        test: [
            { q: "We have high brand _________; customers never switch.", a: "loyalty", options: ["loyalty", "awareness", "share"], exp: "Loyalty — верность бренду." },
            { q: "The company is planning a product _________ in June.", a: "launch", options: ["lifecycle", "placement", "launch"], exp: "Launch — запуск товара." },
            { q: "Our team needs to focus _________ young consumers.", a: "on", options: ["on", "to", "in"], exp: "Focus ON." },
            { q: "The CEO _________ to NY every month.", a: "travels", options: ["travels", "is travelling", "travel"], exp: "Every month — Present Simple." },
            { q: "Look! They _________ the stand right now.", a: "are preparing", options: ["prepare", "are preparing", "prepared"], exp: "Right now — Continuous." },
            { q: "This watch is very _________ (elegant/expensive).", a: "classy", options: ["classy", "cheap", "reliable"], exp: "Classy — изысканный." },
            { q: "If we use a famous name for new goods, it's brand _________.", a: "stretching", options: ["image", "stretching", "loyalty"], exp: "Stretching — растягивание." },
            { q: "Apple has a huge market _________.", a: "share", options: ["name", "share", "target"], exp: "Market share — доля рынка." },
            { q: "A _________ product doesn't break easily.", a: "reliable", options: ["reliable", "stylish", "classy"], exp: "Reliable — надежный." },
            { q: "Luxury brands appeal _________ wealthy people.", a: "to", options: ["to", "for", "on"], exp: "Appeal TO." },
            { q: "We want to expand _________ China.", a: "into", options: ["into", "on", "to"], exp: "Expand INTO." },
            { q: "Always check _________ your boss.", a: "with", options: ["with", "to", "at"], exp: "Check WITH." },
            { q: "They invest _________ new tech.", a: "in", options: ["in", "on", "for"], exp: "Invest IN." },
            { q: "IKEA offers good _________ for money.", a: "value", options: ["cost", "value", "price"], exp: "Value for money." },
            { q: "The market _________ (change) rapidly these days.", a: "is changing", options: ["changes", "is changing", "changed"], exp: "These days — Continuous." },
            { q: "This brand _________ (belong) to LV.", a: "belongs", options: ["belongs", "is belonging", "belong"], exp: "Belong — глагол состояния (Simple)." },
            { q: "He _________ (work) on a project this week.", a: "is working", options: ["works", "is working", "worked"], exp: "This week — временное действие." },
            { q: "We _________ (not / produce) luxury cars.", a: "don't produce", options: ["don't produce", "aren't producing", "doesn't produce"], exp: "Факт — Simple." },
            { q: "At this stage of the _________, sales are falling.", a: "lifecycle", options: ["launch", "lifecycle", "awareness"], exp: "Lifecycle — жизненный цикл." },
            { q: "To go _________ means to sell more expensive goods.", a: "upmarket", options: ["upmarket", "downmarket", "global"], exp: "Upmarket — дорогой сегмент." }
        ],
        text: "Many luxury companies rely on strong brand loyalty to maintain their market share. Brand stretching can be risky but successful if brand awareness is high."
    },
    2: {
        title: "Unit 2: Travel (Путешествия)",
        info: `<h3>1. Похожие слова (Confusing Words)</h3>
               <table class="info-table">
                 <tr><td>Trip</td><td>Поездка (конкретная)</td><td>A business trip.</td></tr>
                 <tr><td>Journey</td><td>Путь (процесс)</td><td>A long journey.</td></tr>
                 <tr class="idiom-row"><td>On business (Idiom)</td><td>По делам</td><td>I am here on business.</td></tr>
               </table>
               <h3>2. Предлоги</h3>
               <table class="info-table">
                 <tr><td>Book <b>in</b> advance</td><td>Заранее</td><td>Always book in advance.</td></tr>
                 <tr><td>Wait <b>for</b></td><td>Ждать</td><td>Waiting for the flight.</td></tr>
               </table>`,
        test: [ /* Сюда вставь 20 вопросов из теста Unit 2, которые я присылал */ ],
        text: "Business trips can be exhausting due to jet lag. Managers should book in advance to avoid peak travel costs."
    }
    // Добавь Unit 3-12 по аналогии
};

let currentU = null;
const grid = document.getElementById('unitGrid');
for(let i=1; i<=12; i++){
    const b = document.createElement('button');
    b.className = 'unit-btn';
    b.innerText = `U ${i}`;
    b.onclick = () => selectU(i, b);
    grid.appendChild(b);
}

function selectU(n, b){
    currentU = n;
    document.querySelectorAll('.unit-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tabsMenu').style.display = 'flex';
    switchTab('info');
}

function switchTab(t){
    const d = unitData[currentU] || { title: "Пусто", info: "Добавьте данные", test: [], text: "" };
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.getElementById(`tab-${t}`).classList.add('active');
    document.querySelectorAll('.info-section, .test-section').forEach(x => x.style.display = 'none');

    if(t === 'info'){
        const box = document.getElementById('infoBox');
        box.innerHTML = `<h2>${d.title}</h2>${d.info}`;
        box.style.display = 'block';
    } else if(t === 'test'){
        renderTest(d.test);
        document.getElementById('testBox').style.display = 'block';
    } else if(t === 'text'){
        const box = document.getElementById('textBox');
        document.getElementById('readText').innerText = d.text;
        box.style.display = 'block';
    }
}

function renderTest(qs){
    const container = document.getElementById('qContainer');
    if(!qs.length){ container.innerHTML = "Вопросы для этого юнита еще не добавлены в код."; return; }
    const shuffled = [...qs].sort(() => Math.random() - 0.5);
    container.innerHTML = shuffled.map((item, idx) => `
        <div class="question-card" id="qc${idx}" data-ans="${item.a}">
            <p><strong>Вопрос ${idx+1}:</strong> ${item.q}</p>
            <div class="options-list">
                ${item.options.map(o => `<label><input type="radio" name="qr${idx}" value="${o}"> ${o}</label>`).join('')}
            </div>
            <div class="explanation" id="ex${idx}">${item.exp}</div>
        </div>
    `).join('');
}

function checkAll(){
    document.querySelectorAll('.question-card').forEach((card, idx) => {
        const sel = card.querySelector(`input[name="qr${idx}"]:checked`);
        const correct = card.getAttribute('data-ans');
        const exp = document.getElementById(`ex${idx}`);
        if(sel){
            card.classList.add(sel.value === correct ? 'correct' : 'incorrect');
            exp.style.display = 'block';
        }
    });
}

function resetAll(){
    document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
    document.querySelectorAll('.question-card').forEach(c => {
        c.classList.remove('correct', 'incorrect');
        c.querySelector('.explanation').style.display = 'none';
    });
}
</script>
</body>
</html>
