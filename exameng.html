<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Leader Prep - 5.0</title>
    <style>
        :root { --red: #e63946; --green: #2a9d8f; --blue: #457b9d; --dark: #1d3557; --light: #f1faee; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); color: var(--dark); padding: 10px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--red); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Кнопки выбора юнита */
        .unit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .unit-btn { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .unit-btn:hover { background: var(--dark); transform: translateY(-2px); }
        .unit-btn.active { background: var(--red); }

        /* Вкладки */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; display: none; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #eee; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--red); color: white; }

        /* Контентные области */
        .content-section { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Таблицы */
        .info-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95em; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .info-table th { background: #f8f8f8; color: var(--blue); }
        .idiom-row { background: #fffdf0; }

        /* Тест */
        .question-card { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 6px solid #ccc; position: relative; }
        .question-card.correct { background: #d8f3dc !important; border-left-color: var(--green) !important; }
        .question-card.incorrect { background: #f8d7da !important; border-left-color: var(--red) !important; }
        .options-list { list-style: none; padding: 0; margin-top: 15px; }
        .options-list label { display: block; padding: 8px; cursor: pointer; border-radius: 5px; }
        .options-list label:hover { background: #eee; }
        .explanation { margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.5); border-radius: 5px; font-weight: bold; display: none; color: #444; }

        /* Кнопки управления */
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 1em; }
        #checkBtn { background: var(--green); }
        #resetBtn { background: var(--blue); }

        /* Текст */
        .reading-text { font-size: 1.1em; line-height: 1.8; background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Market Leader Prep</h1>
    
    <div class="unit-grid" id="unitGrid">
        <!-- Кнопки 1-12 создаются скриптом -->
    </div>

    <div class="tabs" id="tabsMenu">
        <button class="tab-btn active" id="tab-info" onclick="switchTab('info')">ИНФОРМАЦИЯ</button>
        <button class="tab-btn" id="tab-test" onclick="switchTab('test')">ТЕСТ</button>
        <button class="tab-btn" id="tab-text" onclick="switchTab('text')">ТЕКСТ</button>
    </div>

    <div id="infoSection" class="content-section"></div>
    
    <div id="testSection" class="content-section">
        <div id="questionsContainer"></div>
        <div class="action-btns">
            <button id="checkBtn" class="btn-action" onclick="checkTest()">ПРОВЕРИТЬ</button>
            <button id="resetBtn" class="btn-action" onclick="resetTest()">СБРОСИТЬ</button>
        </div>
    </div>

    <div id="textSection" class="content-section">
        <div class="reading-text" id="readingText"></div>
    </div>
</div>

<script>
const unitData = {

    3: {

               <table class="info-table">

                 <tr><td>Relocate</td><td>Переехать</td><td>We are relocating the office to London.</td></tr>

        test: [

        text: "Last year, the turnover rose sharply, but the net profit stayed the same due to debts. Although the share price fluctuated, it levelled off after the dividend was announced."

                 <tr><th>Term</th><th>Translation</th><th>Example</th></tr>
                 <tr><td>Small talk</td><td>Светская беседа</td><td>We started with small talk about weather.</td></tr>
                 <tr><td>Punctuality</td><td>Пунктуальность</td><td>Punctuality is vital in Germany.</td></tr>
                 <tr class="idiom-row"><td>Cultural blunder</td><td>Ляп / Ошибка</td><td>Avoid cultural blunders abroad.</td></tr>
               </table>`,
        test: [

            { q: "In many countries, you _________ point your finger.", a: "mustn't", options: ["mustn't", "don't have to", "should"], exp: "Mustn't — нельзя (запрет)." }
        ],
        text: "When doing business abroad, punctuality and small talk are essential. In some formal cultures, you must follow a strict hierarchy and avoid cultural blunders."
    },

        info: `<h3>Recruitment & Gerunds</h3>

                 <tr><th>Term</th><th>Translation</th><th>Example</th></tr>

        test: [
            { q: "I hope _________ this job.", a: "to get", options: ["getting", "to get", "get"], exp: "Hope + TO." },
            { q: "You should avoid _________ late for interviews.", a: "being", options: ["being", "to be", "be"], exp: "Avoid + -ING." }
        ],
        text: "After a vacancy appeared, the HR began the recruitment. They received many CVs and created a shortlist. Before offering the job, they checked references."
    },
    9: {
        title: "Unit 9: Markets",
        info: `<h3>Trade & Conditionals</h3>
               <table class="info-table">
                 <tr><th>Term</th><th>Translation</th><th>Example</th></tr>
                 <tr><td>Tariff</td><td>Пошлина</td><td>Government collects a tariff on imports.</td></tr>
                 <tr><td>Subsidy</td><td>Субсидия</td><td>Farmers receive a state subsidy.</td></tr>
                 <tr class="idiom-row"><td>Laissez-faire</td><td>Невмешательство</td><td>A laissez-faire economic policy.</td></tr>

            { q: "If I _________ the CEO, I would abolish tariffs.", a: "were", options: ["am", "was", "were"], exp: "2nd Conditional (If I WERE)." }
        ],
        text: "Many countries want to promote free trade. However, some prefer protectionism and use tariffs or quotas to protect local jobs. Liberalising the market increases competition."
    },
    10: {
        title: "Unit 10: Ethics",
        info: `<h3>Problems & Dilemmas</h3>
               <table class="info-table">
                 <tr><th>Term</th><th>Translation</th><th>Example</th></tr>
                 <tr><td>Bribery</td><td>Взятка</td><td>Bribery is illegal and unethical.</td></tr>
                 <tr><td>Counterfeit</td><td>Подделка</td><td>Fake Rolexes are counterfeit goods.</td></tr>
                 <tr class="idiom-row"><td>Whistle-blowing</td><td>Доносительство</td><td>Whistle-blowing is risky for staff.</td></tr>
               </table>`,
        test: [
            { q: "Giving money to an official is _________.", a: "bribery", options: ["bribery", "laundering", "evasion"], exp: "Bribery — взятка." },
            { q: "While I _________ there, I saw a bribe.", a: "was working", options: ["worked", "was working", "had worked"], exp: "Past Continuous (длительность)." }
        ],
        text: "The company faced a scandal involving bribery. An investigation revealed child labour. After a whistle-blower reported the truth, the firm introduced a code of ethics."

    11: {

        info: `<h3>Leadership & Clauses</h3>
               <table class="info-table">
                 <tr><th>Term</th><th>Translation</th><th>Example</th></tr>
                 <tr><td>Decisive</td><td>Решительный</td><td>A decisive leader makes quick choices.</td></tr>
                 <tr><td>Ruthless</td><td>Беспощадный</td><td>A ruthless manager ignores feelings.</td></tr>
                 <tr class="idiom-row"><td>Lead by example</td><td>Пример для всех</td><td>A CEO should lead by example.</td></tr>
               </table>`,
        test: [
            { q: "He is the manager _________ led us to success.", a: "who", options: ["which", "who", "whose"], exp: "WHO — для людей." },
            { q: "A good leader should lead _________ example.", a: "by", options: ["by", "to", "with"], exp: "Lead BY example." }
        ],
        text: "A decisive leader is someone who can inspire a team. A CEO whose management style is accessible has loyal staff. Modern leaders need to delegate tasks."

    12: {
        title: "Unit 12: Competition",
        info: `<h3>Market Strategy</h3>
               <table class="info-table">
                 <tr><th>Term</th><th>Translation</th><th>Example</th></tr>
                 <tr><td>Monopoly</td><td>Монополия</td><td>The firm has a monopoly on oil.</td></tr>
                 <tr><td>Competitive edge</td><td>Преимущество</td><td>Innovation gives us an edge.</td></tr>
                 <tr class="idiom-row"><td>USP</td><td>УТП (Фишка)</td><td>Unique selling point.</td></tr>
               </table>`,
        test: [
            { q: "To stay ahead, we must _________ our rivals.", a: "beat", options: ["win", "beat", "hit"], exp: "Beat — победить конкурента." },
            { q: "Most products _________ in China.", a: "are produced", options: ["produced", "are produced", "were produced"], exp: "Present Passive (факт)." }

let currentUnit = null;

// Создание кнопок юнитов
const grid = document.getElementById('unitGrid');
for(let i=1; i<=12; i++) {
    const btn = document.createElement('button');
    btn.className = 'unit-btn';
    btn.innerText = `U ${i}`;
    btn.onclick = () => selectUnit(i, btn);
    grid.appendChild(btn);
}

function selectUnit(num, btn) {
    currentUnit = num;
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.getElementById('tabsMenu').style.display = 'flex';
    switchTab('info');
}

function switchTab(type) {
    const data = unitData[currentUnit];
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${type}`).classList.add('active');

    document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
    
    if (type === 'info') {
        const infoS = document.getElementById('infoSection');
        infoS.innerHTML = `<h2>${data.title}</h2>${data.info}`;
        infoS.style.display = 'block';
    } else if (type === 'test') {
        renderTest(data.test);
        document.getElementById('testSection').style.display = 'block';
    } else if (type === 'text') {
        const textS = document.getElementById('textSection');
        document.getElementById('readingText').innerText = data.text;
        textS.style.display = 'block';
    }
}

function renderTest(questions) {
    const container = document.getElementById('questionsContainer');
    // ПЕРЕМЕШИВАНИЕ
    const shuffled = [...questions].sort(() => Math.random() - 0.5);
    
    container.innerHTML = shuffled.map((item, idx) => `
        <div class="question-card" id="qCard${idx}" data-correct="${item.a}">
            <p><strong>Q${idx+1}:</strong> ${item.q}</p>
            <div class="options-list">
                ${item.options.map(opt => `
                    <label><input type="radio" name="qRadio${idx}" value="${opt}"> ${opt}</label>
                `).join('')}
            </div>
            <div class="explanation" id="exp${idx}">${item.exp}</div>
        </div>
    `).join('');
}

function checkTest() {
    const cards = document.querySelectorAll('.question-card');
    cards.forEach((card, idx) => {
        const selected = card.querySelector(`input[name="qRadio${idx}"]:checked`);
        const correct = card.getAttribute('data-correct');
        const exp = document.getElementById(`exp${idx}`);
        
        if (selected) {
            if (selected.value === correct) {
                card.classList.add('correct');
                card.classList.remove('incorrect');
            } else {
                card.classList.add('incorrect');
                card.classList.remove('correct');
            }
            exp.style.display = 'block';
        }
    });
}

function resetTest() {
    const radios = document.querySelectorAll('input[type="radio"]');
    radios.forEach(r => r.checked = false);
    document.querySelectorAll('.question-card').forEach(c => {
        c.classList.remove('correct', 'incorrect');
    });
    document.querySelectorAll('.explanation').forEach(e => e.style.display = 'none');
}
</script>

</body>
</html>
